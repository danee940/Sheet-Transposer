<div class="overflow-x-auto">
  <table class="w-full border-collapse text-sm">
    <thead>
      <tr class="text-left text-muted-light dark:text-muted">
        <th scope="col" class="pb-2 pr-4 font-medium">Note</th>
        {% for header in chart.headers %}
        <th scope="col" class="pb-2 pr-4 font-medium">{{ header }}</th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for row in chart.rows %}
      <tr class="border-t border-app-border-light dark:border-app-border">
        <th scope="row" class="py-2 pr-4 text-left font-mono font-semibold text-slate-900 dark:text-slate-100">{{ row.note }}</th>
        {% for cell in row.cells %}
        <td class="py-2 pr-4 font-mono text-slate-800 dark:text-slate-200">{{ cell }}</td>
        {% endfor %}
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
