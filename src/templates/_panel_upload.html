<section id="panel-upload" role="tabpanel" aria-labelledby="tab-upload" class="hidden">
  <h2 class="mb-1 text-lg font-semibold text-slate-900 dark:text-slate-100">Transpose a chord sheet</h2>
  <p class="mb-5 text-sm text-muted-light dark:text-muted">
    Upload a Word (.docx), plain text (.txt), or ChordPro (.pro/.cho) chord sheet, or drop several
    .docx files to build a single combined PDF binder — all with the formatting kept intact.
  </p>

  <form id="form">
    <span class="mb-1.5 mt-4 block text-sm text-muted-light dark:text-muted">Chord sheet (.docx, .txt, .pro, .cho)</span>
    <label id="dropzone" for="file"
      class="flex cursor-pointer flex-col items-center justify-center gap-2 rounded-xl border-2 border-dashed border-app-border-light bg-bg-light px-4 py-6 text-center transition-colors hover:border-accent focus-within:border-accent focus-within:ring-2 focus-within:ring-accent dark:border-app-border dark:bg-bg">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round" class="text-muted-light dark:text-muted" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="17 8 12 3 7 8" />
        <line x1="12" y1="3" x2="12" y2="15" />
      </svg>
      <span id="dropzone-text" class="text-sm text-muted-light dark:text-muted">
        <span class="font-medium text-slate-800 dark:text-slate-200">Drop your chord sheets here</span> or click to browse
      </span>
      <input id="file" name="file" type="file" accept=".docx,.txt,.pro,.cho" multiple required class="sr-only" />
    </label>

    <div class="mt-4 flex items-end gap-2">
      <div class="flex-1">
        <label for="current_key" class="mb-1.5 block text-sm text-muted-light dark:text-muted">Current key</label>
        <select id="current_key" name="current_key" required
          class="w-full rounded-xl border border-app-border-light bg-bg-light px-3 py-2.5 text-sm text-slate-800 focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent dark:border-app-border dark:bg-bg dark:text-slate-200">
          {% for key in keys %}<option value="{{ key }}">{{ key }}</option>{% endfor %}
        </select>
      </div>
      <button type="button" id="swap" aria-label="Swap keys" title="Swap keys"
        class="mb-0.5 flex h-11 w-11 shrink-0 items-center justify-center rounded-xl border border-app-border-light bg-bg-light text-muted-light transition-colors hover:border-accent hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-accent dark:border-app-border dark:bg-bg dark:text-muted dark:hover:text-slate-100">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="17 1 21 5 17 9" />
          <path d="M3 11V9a4 4 0 0 1 4-4h14" />
          <polyline points="7 23 3 19 7 15" />
          <path d="M21 13v2a4 4 0 0 1-4 4H3" />
        </svg>
      </button>
      <div class="flex-1">
        <label for="target_key" class="mb-1.5 block text-sm text-muted-light dark:text-muted">Desired key</label>
        <select id="target_key" name="target_key" required
          class="w-full rounded-xl border border-app-border-light bg-bg-light px-3 py-2.5 text-sm text-slate-800 focus:border-accent focus:outline-none focus:ring-2 focus:ring-accent dark:border-app-border dark:bg-bg dark:text-slate-200">
          {% for key in keys %}<option value="{{ key }}" {% if key=="D" %} selected{% endif %}>{{ key }}</option>{%
          endfor %}
        </select>
      </div>
    </div>

    <span class="mb-1.5 mt-4 block text-sm text-muted-light dark:text-muted">Output format</span>
    <div class="flex gap-3">
      <label
        class="flex flex-1 cursor-pointer items-center gap-2 rounded-xl border border-app-border-light bg-bg-light px-3 py-2.5 text-sm text-slate-800 focus-within:border-accent focus-within:ring-2 focus-within:ring-accent dark:border-app-border dark:bg-bg dark:text-slate-200">
        <input type="radio" name="format" value="docx" class="accent-accent focus:outline-none" checked />
        .docx
      </label>
      <label
        class="flex flex-1 cursor-pointer items-center gap-2 rounded-xl border border-app-border-light bg-bg-light px-3 py-2.5 text-sm text-slate-800 focus-within:border-accent focus-within:ring-2 focus-within:ring-accent dark:border-app-border dark:bg-bg dark:text-slate-200">
        <input type="radio" name="format" value="pdf" class="accent-accent focus:outline-none" />
        .pdf
      </label>
    </div>

    <button id="submit" type="submit"
      class="mt-6 flex w-full items-center justify-center gap-2 rounded-xl bg-accent px-3 py-3 text-base font-semibold text-white transition-colors hover:bg-accent-hover focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-card-light dark:focus:ring-offset-card disabled:cursor-not-allowed disabled:opacity-60">
      <svg id="spinner" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" class="hidden motion-safe:animate-spin" aria-hidden="true">
        <path d="M21 12a9 9 0 1 1-6.219-8.56" />
      </svg>
      <span id="submit-label">Transpose &amp; Download</span>
    </button>
  </form>

  <div id="message" class="mt-4 hidden rounded-xl px-3.5 py-3 text-sm" role="status" aria-live="polite"></div>
</section>
