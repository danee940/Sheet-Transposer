  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Chord Transposer",
    "url": "https://chordtransposer.app/",
    "description": "Free online tool to transpose chords between musical keys. Paste chords for an instant preview, or upload a .docx chord sheet to download it transposed with formatting preserved. Supports standard and German (H) chord notation.",
    "applicationCategory": "MultimediaApplication",
    "operatingSystem": "Any",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How do I transpose chords to a different key?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Paste your chords into the box, choose the key the song is currently in, and pick the key you want it in. The transposed chords appear instantly, with no upload or download needed. Every chord is shifted by the same interval so the song sounds identical, just higher or lower."
        }
      },
      {
        "@type": "Question",
        "name": "Can I transpose chords without uploading a file?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Use the paste-chords mode to type or paste chords directly and see the transposed result instantly in your browser. Uploading a .docx file is optional and only needed when you want to download a transposed Word or PDF document."
        }
      },
      {
        "@type": "Question",
        "name": "Does transposing keep my document formatting?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Only the chord names in the text are changed. Fonts, spacing, colours, tables, and the overall layout of the .docx are preserved."
        }
      },
      {
        "@type": "Question",
        "name": "Which chords and keys are supported?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "All twelve major and twelve minor keys are supported, including sharp and flat spellings such as C#, Db, F#m, and Bbm. Slash chords, sus, add, maj7, and other chord qualities are recognised and transposed correctly."
        }
      },
      {
        "@type": "Question",
        "name": "Do you support German H notation?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. German notation where H means B and B means B-flat is detected and transposed correctly, so sheets written in either the English or German system work."
        }
      },
      {
        "@type": "Question",
        "name": "Is the chord transposer free?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, the tool is completely free. There is no sign-up, and you can transpose as many chord sheets as you like."
        }
      },
      {
        "@type": "Question",
        "name": "Can I download the result as a PDF?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Choose the PDF output option before transposing and the transposed chord sheet is returned as a ready-to-print PDF. You can also keep it as an editable .docx."
        }
      },
      {
        "@type": "Question",
        "name": "Are my files stored anywhere?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Your chord sheet is processed to generate the transposed file and is not kept after the download is returned."
        }
      }
    ]
  }
  </script>

            "muted-light": "#64748b",
            "app-border-light": "#e2e8f0",
          },

              "100%": { opacity: "1", transform: "translateY(0)" },
            },
          },

            "fade-up": "fade-up 0.5s ease-out both",
          },
        },
      },
    };
