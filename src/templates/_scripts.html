<script>
  const form = document.getElementById("form");
  const submit = document.getElementById("submit");
  const submitLabel = document.getElementById("submit-label");
  const spinner = document.getElementById("spinner");
  const message = document.getElementById("message");
  const fileInput = document.getElementById("file");
  const dropzone = document.getElementById("dropzone");
  const dropzoneText = document.getElementById("dropzone-text");
  const currentKey = document.getElementById("current_key");
  const targetKey = document.getElementById("target_key");
  const swap = document.getElementById("swap");

  const MAX_UPLOAD_BYTES = 10 * 1024 * 1024;
  const DEFAULT_DROPZONE_HTML =
    '<span class="font-medium text-slate-800 dark:text-slate-200">Drop your .docx here</span> or click to browse';

  const BASE_CLASSES = "mt-4 rounded-xl px-3.5 py-3 text-sm motion-safe:animate-fade-up";
  const ERROR_CLASSES = "border border-app-error/30 bg-app-error/10 text-app-error";
  const OK_CLASSES = "border border-app-ok/30 bg-app-ok/10 text-app-ok";

  function hideMessage() {
    message.className = BASE_CLASSES + " hidden";
    message.replaceChildren();
  }

  function show(kind, text) {
    message.className = BASE_CLASSES + " " + (kind === "error" ? ERROR_CLASSES : OK_CLASSES);
    message.textContent = text;
  }

  function formatBytes(bytes) {
    const mb = bytes / (1024 * 1024);
    return mb >= 1 ? `${mb.toFixed(1)} MB` : `${Math.max(1, Math.round(bytes / 1024))} KB`;
  }

  function validateFile(file) {
    if (!file) return "Please choose a .docx file to upload.";
    if (!file.name.toLowerCase().endsWith(".docx")) return "Only .docx files are supported.";
    if (file.size === 0) return "The selected file is empty.";
    if (file.size > MAX_UPLOAD_BYTES) return "File is too large. The maximum size is 10 MB.";
    return null;
  }

  function updateDropzone(file) {
    if (!file) {
      dropzoneText.innerHTML = DEFAULT_DROPZONE_HTML;
      return;
    }
    dropzoneText.innerHTML =
      `<span class="font-medium text-slate-800 dark:text-slate-200"></span>` +
      `<span class="block text-xs text-muted-light dark:text-muted"></span>`;
    dropzoneText.firstChild.textContent = file.name;
    dropzoneText.lastChild.textContent = formatBytes(file.size);
  }

  fileInput.addEventListener("change", () => {
    hideMessage();
    const file = fileInput.files[0];
    updateDropzone(file);
    const error = validateFile(file);
    if (file && error) {
      show("error", error);
      fileInput.value = "";
      updateDropzone(null);
    }
  });

  ["dragenter", "dragover"].forEach((name) =>
    dropzone.addEventListener(name, (event) => {
      event.preventDefault();
      dropzone.classList.add("border-accent", "bg-accent/5");
    })
  );
  ["dragleave", "dragend", "drop"].forEach((name) =>
    dropzone.addEventListener(name, (event) => {
      event.preventDefault();
      dropzone.classList.remove("border-accent", "bg-accent/5");
    })
  );
  dropzone.addEventListener("drop", (event) => {
    const file = event.dataTransfer?.files?.[0];
    if (!file) return;
    const dataTransfer = new DataTransfer();
    dataTransfer.items.add(file);
    fileInput.files = dataTransfer.files;
    fileInput.dispatchEvent(new Event("change"));
  });

  swap.addEventListener("click", () => {
    const from = currentKey.value;
    currentKey.value = targetKey.value;
    targetKey.value = from;
  });

  const tabPaste = document.getElementById("tab-paste");
  const tabUpload = document.getElementById("tab-upload");
  const panelPaste = document.getElementById("panel-paste");
  const panelUpload = document.getElementById("panel-upload");

  const ACTIVE_TAB_CLASSES = ["bg-card-light", "text-slate-900", "shadow-sm", "dark:bg-card", "dark:text-slate-100"];
  const INACTIVE_TAB_CLASSES = ["text-muted-light", "dark:text-muted"];

  function selectTab(active) {
    const paste = active === "paste";
    tabPaste.setAttribute("aria-selected", String(paste));
    tabUpload.setAttribute("aria-selected", String(!paste));
    panelPaste.classList.toggle("hidden", !paste);
    panelUpload.classList.toggle("hidden", paste);
    tabPaste.classList.remove(...ACTIVE_TAB_CLASSES, ...INACTIVE_TAB_CLASSES);
    tabUpload.classList.remove(...ACTIVE_TAB_CLASSES, ...INACTIVE_TAB_CLASSES);
    tabPaste.classList.add(...(paste ? ACTIVE_TAB_CLASSES : INACTIVE_TAB_CLASSES));
    tabUpload.classList.add(...(paste ? INACTIVE_TAB_CLASSES : ACTIVE_TAB_CLASSES));
  }

  tabPaste.addEventListener("click", () => selectTab("paste"));
  tabUpload.addEventListener("click", () => selectTab("upload"));
  selectTab("paste");

  const textInput = document.getElementById("text_input");
  const textOutput = document.getElementById("text_output");
  const textStatus = document.getElementById("text_status");
  const textCopy = document.getElementById("text_copy");
  const textCurrentKey = document.getElementById("text_current_key");
  const textTargetKey = document.getElementById("text_target_key");
  const textSwap = document.getElementById("text_swap");
  const textLineCount = document.getElementById("text_linecount");
  const textSample = document.getElementById("text_sample");
  const textClear = document.getElementById("text_clear");

  const modeKey = document.getElementById("mode-key");
  const modeSemitone = document.getElementById("mode-semitone");
  const modeNashville = document.getElementById("mode-nashville");
  const controlsKey = document.getElementById("controls-key");
  const controlsSemitone = document.getElementById("controls-semitone");
  const textCurrentKeyLabel = document.querySelector('label[for="text_current_key"]');
  const chordproFormatToggle = document.getElementById("chordpro-format-toggle");
  const formatChordpro = document.getElementById("format_chordpro");
  const formatPlain = document.getElementById("format_plain");
  const semitoneValue = document.getElementById("semitone_value");
  const semitoneDown = document.getElementById("semitone_down");
  const semitoneUp = document.getElementById("semitone_up");
  const semitoneQuick = document.querySelectorAll(".semitone-quick");
  const notationSharp = document.getElementById("notation_sharp");
  const notationFlat = document.getElementById("notation_flat");

  const MAX_SEMITONES = parseInt("{{ max_semitones }}", 10);
  const SAMPLE_CHORDS =
    "C           G           Am          F\n" +
    "Twinkle twinkle little star\n\n" +
    "C           G           C\n" +
    "How I wonder what you are\n\n" +
    "F      C      G      C\n" +
    "Up above the world so high";

  let transposeMode = "key";
  let semitones = 0;
  let useFlats = false;
  let outputFormat = "chordpro";
  let transposeTimer = null;
  let requestToken = 0;

  function setTextStatus(text) {
    textStatus.textContent = text;
  }

  function updateLineCount() {
    const value = textInput.value;
    const lines = value === "" ? 0 : value.split("\n").length;
    textLineCount.textContent = `${lines} line${lines === 1 ? "" : "s"}`;
  }

  const MODE_ACTIVE_CLASSES = ["bg-card-light", "text-slate-900", "shadow-sm", "dark:bg-card", "dark:text-slate-100"];
  const MODE_INACTIVE_CLASSES = ["text-muted-light", "dark:text-muted"];

  function setModeButtonState(button, active) {
    button.setAttribute("aria-selected", String(active));
    button.classList.remove(...MODE_ACTIVE_CLASSES, ...MODE_INACTIVE_CLASSES);
    button.classList.add(...(active ? MODE_ACTIVE_CLASSES : MODE_INACTIVE_CLASSES));
  }

  function selectMode(mode) {
    transposeMode = mode;
    const key = mode === "key";
    const nashville = mode === "nashville";
    const showKeyControls = key || nashville;

    controlsKey.classList.toggle("hidden", !showKeyControls);
    controlsSemitone.classList.toggle("hidden", mode !== "semitone");

    textTargetKey.parentElement.classList.toggle("hidden", nashville);
    textSwap.classList.toggle("hidden", nashville);
    textCurrentKeyLabel.textContent = nashville ? "Tonic key" : "Current key";

    setModeButtonState(modeKey, key);
    setModeButtonState(modeSemitone, mode === "semitone");
    setModeButtonState(modeNashville, nashville);

    if (nashville) {
      chordproFormatToggle.classList.add("hidden");
    }
    runTextTranspose();
  }

  function updateSemitoneDisplay() {
    semitoneValue.textContent = semitones > 0 ? `+${semitones}` : String(semitones);
  }

  function setSemitones(value) {
    semitones = Math.max(-MAX_SEMITONES, Math.min(MAX_SEMITONES, value));
    updateSemitoneDisplay();
    runTextTranspose();
  }

  function selectNotation(flat) {
    useFlats = flat;
    notationSharp.setAttribute("aria-pressed", String(!flat));
    notationFlat.setAttribute("aria-pressed", String(flat));
    notationSharp.classList.remove(...MODE_ACTIVE_CLASSES, ...MODE_INACTIVE_CLASSES);
    notationFlat.classList.remove(...MODE_ACTIVE_CLASSES, ...MODE_INACTIVE_CLASSES);
    notationSharp.classList.add(...(flat ? MODE_INACTIVE_CLASSES : MODE_ACTIVE_CLASSES));
    notationFlat.classList.add(...(flat ? MODE_ACTIVE_CLASSES : MODE_INACTIVE_CLASSES));
    runTextTranspose();
  }

  function selectOutputFormat(plain) {
    outputFormat = plain ? "plain" : "chordpro";
    formatChordpro.setAttribute("aria-pressed", String(!plain));
    formatPlain.setAttribute("aria-pressed", String(plain));
    formatChordpro.classList.remove(...MODE_ACTIVE_CLASSES, ...MODE_INACTIVE_CLASSES);
    formatPlain.classList.remove(...MODE_ACTIVE_CLASSES, ...MODE_INACTIVE_CLASSES);
    formatChordpro.classList.add(...(plain ? MODE_INACTIVE_CLASSES : MODE_ACTIVE_CLASSES));
    formatPlain.classList.add(...(plain ? MODE_ACTIVE_CLASSES : MODE_INACTIVE_CLASSES));
    runTextTranspose();
  }

  function buildRequestBody(text) {
    if (transposeMode === "nashville") {
      return { text, tonic_key: textCurrentKey.value };
    }
    if (transposeMode === "semitone") {
      return { text, semitones, notation: useFlats ? "flat" : "sharp", output_format: outputFormat };
    }
    return {
      text,
      current_key: textCurrentKey.value,
      target_key: textTargetKey.value,
      output_format: outputFormat,
    };
  }

  function summariseResult(data) {
    if (transposeMode === "nashville") {
      return `Nashville · key of ${data.tonic}`;
    }
    const count = Array.isArray(data.changes) ? data.changes.length : 0;
    const label = transposeMode === "semitone" ? data.label : `${data.from} → ${data.to}`;
    return count > 0
      ? `${label} · ${count} chord${count === 1 ? "" : "s"} changed`
      : `${label} · no chords found to change`;
  }

  async function runTextTranspose() {
    const text = textInput.value;
    if (!text.trim()) {
      textOutput.textContent = "";
      textCopy.disabled = true;
      setTextStatus("");
      chordproFormatToggle.classList.add("hidden");
      return;
    }
    if (transposeMode === "key" && textCurrentKey.value === textTargetKey.value) {
      setTextStatus("Pick two different keys to transpose.");
      return;
    }
    if (transposeMode === "semitone" && semitones === 0) {
      textOutput.textContent = text;
      textCopy.disabled = !text;
      setTextStatus("No shift · pick a semitone offset to transpose.");
      return;
    }

    const token = ++requestToken;
    setTextStatus("Transposing…");

    const endpoint = transposeMode === "nashville" ? "/nashville-text" : "/transpose-text";

    try {
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(buildRequestBody(text)),
      });
      if (token !== requestToken) return;

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        setTextStatus(data.error || "Something went wrong.");
        return;
      }

      const isChordPro = data.format === "chordpro" && transposeMode !== "nashville";
      chordproFormatToggle.classList.toggle("hidden", !isChordPro);

      textOutput.textContent = data.text;
      textCopy.disabled = !data.text;
      setTextStatus(summariseResult(data));
    } catch {
      if (token === requestToken) setTextStatus("Network error. Please try again.");
    }
  }

  function scheduleTextTranspose() {
    clearTimeout(transposeTimer);
    transposeTimer = setTimeout(runTextTranspose, 250);
  }

  textInput.addEventListener("input", () => {
    updateLineCount();
    scheduleTextTranspose();
  });
  textCurrentKey.addEventListener("change", runTextTranspose);
  textTargetKey.addEventListener("change", runTextTranspose);

  textSwap.addEventListener("click", () => {
    const from = textCurrentKey.value;
    textCurrentKey.value = textTargetKey.value;
    textTargetKey.value = from;
    runTextTranspose();
  });

  textSample.addEventListener("click", () => {
    textInput.value = SAMPLE_CHORDS;
    updateLineCount();
    runTextTranspose();
    textInput.focus();
  });

  textClear.addEventListener("click", () => {
    textInput.value = "";
    updateLineCount();
    runTextTranspose();
    textInput.focus();
  });

  modeKey.addEventListener("click", () => selectMode("key"));
  modeSemitone.addEventListener("click", () => selectMode("semitone"));
  modeNashville.addEventListener("click", () => selectMode("nashville"));
  formatChordpro.addEventListener("click", () => selectOutputFormat(false));
  formatPlain.addEventListener("click", () => selectOutputFormat(true));
  semitoneDown.addEventListener("click", () => setSemitones(semitones - 1));
  semitoneUp.addEventListener("click", () => setSemitones(semitones + 1));
  semitoneQuick.forEach((button) =>
    button.addEventListener("click", () => setSemitones(Number(button.dataset.semitone)))
  );
  notationSharp.addEventListener("click", () => selectNotation(false));
  notationFlat.addEventListener("click", () => selectNotation(true));

  document.addEventListener("keydown", (event) => {
    if (transposeMode !== "semitone") return;
    const target = event.target;
    const typing = target && (target.tagName === "TEXTAREA" || target.tagName === "INPUT" || target.tagName === "SELECT");
    if (typing) return;
    if (event.key === "[") {
      event.preventDefault();
      setSemitones(semitones - 1);
    } else if (event.key === "]") {
      event.preventDefault();
      setSemitones(semitones + 1);
    }
  });

  selectOutputFormat(false);
  selectMode("key");
  selectNotation(false);
  updateSemitoneDisplay();
  updateLineCount();

  textCopy.addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText(textOutput.textContent);
      const original = textCopy.textContent;
      textCopy.textContent = "Copied";
      setTimeout(() => {
        textCopy.textContent = original;
      }, 1500);
    } catch {
      setTextStatus("Could not copy to clipboard.");
    }
  });

  const capoKey = document.getElementById("capo-key");
  const capoTableOutput = document.getElementById("capo-table-output");

  const CAPO_NOTE_NAMES = ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"];
  const CAPO_FRIENDLY_SHAPES = [
    { semitone: 0, major: "C", minor: "Am" },
    { semitone: 2, major: "D", minor: "Bm" },
    { semitone: 4, major: "E", minor: "C#m" },
    { semitone: 5, major: "F", minor: "Dm" },
    { semitone: 7, major: "G", minor: "Em" },
    { semitone: 9, major: "A", minor: "F#m" },
  ];
  const MAX_CAPO_FRET = 7;

  function keyToCapoSemitone(key) {
    const cleaned = key.replace(/m$/, "");
    return CAPO_NOTE_NAMES.reduce((acc, name, index) => {
      if (acc !== null) return acc;
      const sharpName = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"][index];
      return name === cleaned || sharpName === cleaned ? index : null;
    }, null);
  }

  function renderCapoTable() {
    const key = capoKey.value;
    const isMinor = key.endsWith("m");
    const tonic = keyToCapoSemitone(key);
    capoTableOutput.replaceChildren();
    if (tonic === null) return;

    const rows = [];
    for (const shape of CAPO_FRIENDLY_SHAPES) {
      const fret = (tonic - shape.semitone + 12) % 12;
      if (fret > MAX_CAPO_FRET) continue;
      rows.push({ fret, shape: isMinor ? shape.minor : shape.major });
    }
    rows.sort((a, b) => a.fret - b.fret);

    const table = document.createElement("table");
    table.className = "w-full border-collapse";
    const thead = document.createElement("thead");
    const headRow = document.createElement("tr");
    headRow.className = "text-left text-muted-light dark:text-muted";
    headRow.appendChild(makeHeaderCell("Capo fret", "pb-2 pr-4 font-medium"));
    headRow.appendChild(makeHeaderCell("Play shape", "pb-2 pr-4 font-medium"));
    headRow.appendChild(makeHeaderCell("Sounds like", "pb-2 font-medium"));
    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    for (const row of rows) {
      const tr = document.createElement("tr");
      tr.className = "border-t border-app-border-light dark:border-app-border";
      tr.appendChild(makeCell(row.fret === 0 ? "No capo" : String(row.fret), "py-2 pr-4"));
      tr.appendChild(makeCell(row.shape, "py-2 pr-4 font-mono text-slate-900 dark:text-slate-100"));
      tr.appendChild(makeCell(key, "py-2 font-mono text-slate-900 dark:text-slate-100"));
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    capoTableOutput.appendChild(table);
  }

  capoKey.addEventListener("change", renderCapoTable);
  renderCapoTable();

  function makeCell(text, className) {
    const cell = document.createElement("td");
    cell.className = className;
    cell.textContent = text;
    return cell;
  }

  function makeHeaderCell(text, className) {
    const cell = document.createElement("th");
    cell.className = className;
    cell.textContent = text;
    return cell;
  }

  function showTransposeResult(from, to, changesRaw) {
    message.className = BASE_CLASSES + " " + OK_CLASSES;
    message.replaceChildren();

    const heading = document.createElement("div");
    heading.className = "mb-2 font-semibold";
    heading.textContent = `Transposed from ${from} to ${to}`;
    message.appendChild(heading);

    const pairs = changesRaw
      .split(",")
      .map(s => s.trim())
      .filter(Boolean)
      .map(s => s.split("->"));

    const table = document.createElement("table");
    table.className = "w-full border-collapse";

    const thead = document.createElement("thead");
    const headRow = document.createElement("tr");
    headRow.className = "text-left opacity-60";
    headRow.appendChild(makeHeaderCell("Before", "pb-1 pr-4 font-medium"));
    headRow.appendChild(makeHeaderCell("After", "pb-1 font-medium"));
    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");
    for (const [orig, transposed] of pairs) {
      const row = document.createElement("tr");
      row.className = "border-t border-app-ok/20";
      row.appendChild(makeCell(orig, "py-1 pr-4 font-mono"));
      row.appendChild(makeCell(transposed, "py-1 font-mono"));
      tbody.appendChild(row);
    }
    table.appendChild(tbody);

    message.appendChild(table);
  }

  function parseDownloadFilename(disposition, fallback) {
    const extendedMatch = disposition.match(/filename\*=UTF-8''([^;]+)/i);
    if (extendedMatch) {
      try {
        return decodeURIComponent(extendedMatch[1]);
      } catch {
        return fallback;
      }
    }
    const quotedMatch = disposition.match(/filename="([^"]+)"/i);
    if (quotedMatch) {
      return quotedMatch[1];
    }
    const bareMatch = disposition.match(/filename=([^;]+)/i);
    if (bareMatch) {
      return bareMatch[1].trim();
    }
    return fallback;
  }

  function setLoading(loading) {
    submit.disabled = loading;
    spinner.classList.toggle("hidden", !loading);
    submitLabel.textContent = loading ? "Transposing..." : "Transpose & Download";
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    hideMessage();

    const fileError = validateFile(fileInput.files[0]);
    if (fileError) {
      show("error", fileError);
      return;
    }
    if (currentKey.value === targetKey.value) {
      show("error", "Current and desired keys are the same. Pick a different key to transpose.");
      return;
    }

    setLoading(true);

    try {
      const response = await fetch("/transpose", { method: "POST", body: new FormData(form) });

      if (!response.ok) {
        const data = await response.json().catch(() => ({ error: "Something went wrong." }));
        show("error", data.error || "Something went wrong.");
        return;
      }

      const from = decodeURIComponent(response.headers.get("X-Transpose-From") || "?");
      const to = decodeURIComponent(response.headers.get("X-Transpose-To") || "?");
      const changes = decodeURIComponent(response.headers.get("X-Transpose-Changes") || "none");

      const disposition = response.headers.get("Content-Disposition") || "";
      const selectedFormat = form.querySelector('input[name="format"]:checked')?.value || "docx";
      const filename = parseDownloadFilename(disposition, `transposed.${selectedFormat}`);

      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);

      showTransposeResult(from, to, changes);
    } catch (err) {
      show("error", "Network error. Please try again.");
    } finally {
      setLoading(false);
    }
  });
</script>
