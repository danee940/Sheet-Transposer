<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chord Transposer — Transpose .docx Chord Sheets to Any Key Online</title>
  <meta name="description"
    content="Free online chord transposer. Upload a .docx chord sheet, pick the current and target key, and download the transposed version instantly. Keeps formatting and supports German (H) notation." />
  <meta name="keywords"
    content="chord transposer, transpose chords, transpose chord sheet, change song key, chord chart transposer, docx chord sheet, transpose to any key" />
  <meta name="author" content="danee940" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://chordtransposer.app/" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Chord Transposer" />
  <meta property="og:title" content="Chord Transposer — Transpose .docx Chord Sheets to Any Key" />
  <meta property="og:description"
    content="Upload a .docx chord sheet, pick the keys, and download the transposed version instantly. Free, formatting-preserving chord transposer." />
  <meta property="og:url" content="https://chordtransposer.app/" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Chord Transposer — Transpose .docx Chord Sheets to Any Key" />
  <meta name="twitter:description"
    content="Free online tool to transpose .docx chord sheets to any key while preserving formatting." />

  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%236366f1'/%3E%3Ctext x='12' y='17' font-family='sans-serif' font-size='14' font-weight='bold' text-anchor='middle' fill='white'%3E%E2%99%AC%3C/text%3E%3C/svg%3E" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Chord Transposer",
    "url": "https://chordtransposer.app/",
    "description": "Free online tool to transpose .docx chord sheets between musical keys while preserving document formatting. Supports standard and German (H) chord notation.",
    "applicationCategory": "MultimediaApplication",
    "operatingSystem": "Any",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    }
  }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: "#0f172a",
            card: "#1e293b",
            accent: "#6366f1",
            "accent-hover": "#4f46e5",
            muted: "#94a3b8",
            "app-border": "#334155",
            "app-error": "#f87171",
            "app-ok": "#34d399",
          },
        },
      },
    };
  </script>
</head>

<body class="m-0 min-h-screen bg-bg px-4 py-12 text-slate-200 font-sans flex flex-col justify-center items-center">
  <main class="w-full max-w-md rounded-2xl border border-app-border bg-card p-8 shadow-2xl shadow-black/40">
    <h1 class="mb-1 text-2xl font-semibold">Chord Transposer</h1>
    <p class="mb-6 text-sm text-muted">Upload a chord sheet (.docx), pick the keys, and download the transposed version.
    </p>

    <form id="form">
      <label for="file" class="mb-1.5 mt-4 block text-sm text-muted">Chord sheet (.docx)</label>
      <input id="file" name="file" type="file" accept=".docx" required
        class="w-full rounded-xl border border-app-border bg-bg px-3 py-2.5 text-sm text-slate-200 file:mr-3 file:rounded-lg file:border-0 file:bg-accent file:px-3 file:py-1.5 file:text-white hover:file:bg-accent-hover" />

      <div class="flex gap-3">
        <div class="flex-1">
          <label for="current_key" class="mb-1.5 mt-4 block text-sm text-muted">Current key</label>
          <select id="current_key" name="current_key" required
            class="w-full rounded-xl border border-app-border bg-bg px-3 py-2.5 text-sm text-slate-200">
            {% for key in keys %}<option value="{{ key }}">{{ key }}</option>{% endfor %}
          </select>
        </div>
        <div class="flex-1">
          <label for="target_key" class="mb-1.5 mt-4 block text-sm text-muted">Desired key</label>
          <select id="target_key" name="target_key" required
            class="w-full rounded-xl border border-app-border bg-bg px-3 py-2.5 text-sm text-slate-200">
            {% for key in keys %}<option value="{{ key }}" {% if key=="D" %} selected{% endif %}>{{ key }}</option>{%
            endfor %}
          </select>
        </div>
      </div>

      <span class="mb-1.5 mt-4 block text-sm text-muted">Output format</span>
      <div class="flex gap-3">
        <label
          class="flex flex-1 cursor-pointer items-center gap-2 rounded-xl border border-app-border bg-bg px-3 py-2.5 text-sm text-slate-200">
          <input type="radio" name="format" value="docx" class="accent-accent" checked />
          .docx
        </label>
        <label
          class="flex flex-1 cursor-pointer items-center gap-2 rounded-xl border border-app-border bg-bg px-3 py-2.5 text-sm text-slate-200">
          <input type="radio" name="format" value="pdf" class="accent-accent" />
          .pdf
        </label>
      </div>

      <button id="submit" type="submit"
        class="mt-6 w-full rounded-xl bg-accent px-3 py-3 text-base font-semibold text-white transition-colors hover:bg-accent-hover disabled:cursor-not-allowed disabled:opacity-60">
        Transpose &amp; Download
      </button>
    </form>

    <div id="message" class="mt-4 hidden rounded-xl px-3.5 py-3 text-sm"></div>
  </main>

  <footer class="mt-6 text-sm text-muted">
    <a href="https://github.com/danee940/Chord-Transposer" target="_blank" rel="noopener noreferrer"
      class="inline-flex items-center gap-2 transition-colors hover:text-slate-200">
      <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true">
        <path
          d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
        </path>
      </svg>
      View on GitHub
    </a>
  </footer>

  <script>
    const form = document.getElementById("form");
    const submit = document.getElementById("submit");
    const message = document.getElementById("message");

    const BASE_CLASSES = "mt-4 rounded-xl px-3.5 py-3 text-sm";
    const ERROR_CLASSES = "border border-app-error/30 bg-app-error/10 text-app-error";
    const OK_CLASSES = "border border-app-ok/30 bg-app-ok/10 text-app-ok";

    function hideMessage() {
      message.className = BASE_CLASSES + " hidden";
      message.innerHTML = "";
    }

    function show(kind, text) {
      message.className = BASE_CLASSES + " " + (kind === "error" ? ERROR_CLASSES : OK_CLASSES);
      message.textContent = text;
    }

    function makeCell(text, className) {
      const cell = document.createElement("td");
      cell.className = className;
      cell.textContent = text;
      return cell;
    }

    function makeHeaderCell(text, className) {
      const cell = document.createElement("th");
      cell.className = className;
      cell.textContent = text;
      return cell;
    }

    function showTransposeResult(from, to, changesRaw) {
      message.className = BASE_CLASSES + " " + OK_CLASSES;
      message.replaceChildren();

      const heading = document.createElement("div");
      heading.className = "mb-2 font-semibold";
      heading.textContent = `Transposed from ${from} to ${to}`;
      message.appendChild(heading);

      const pairs = changesRaw
        .split(",")
        .map(s => s.trim())
        .filter(Boolean)
        .map(s => s.split("->"));

      const table = document.createElement("table");
      table.className = "w-full border-collapse";

      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      headRow.className = "text-left opacity-60";
      headRow.appendChild(makeHeaderCell("Before", "pb-1 pr-4 font-medium"));
      headRow.appendChild(makeHeaderCell("After", "pb-1 font-medium"));
      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      for (const [orig, transposed] of pairs) {
        const row = document.createElement("tr");
        row.className = "border-t border-app-ok/20";
        row.appendChild(makeCell(orig, "py-1 pr-4 font-mono"));
        row.appendChild(makeCell(transposed, "py-1 font-mono"));
        tbody.appendChild(row);
      }
      table.appendChild(tbody);

      message.appendChild(table);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      hideMessage();
      submit.disabled = true;
      submit.textContent = "Transposing...";

      try {
        const response = await fetch("/transpose", { method: "POST", body: new FormData(form) });

        if (!response.ok) {
          const data = await response.json().catch(() => ({ error: "Something went wrong." }));
          show("error", data.error || "Something went wrong.");
          return;
        }

        const from = decodeURIComponent(response.headers.get("X-Transpose-From") || "?");
        const to = decodeURIComponent(response.headers.get("X-Transpose-To") || "?");
        const changes = decodeURIComponent(response.headers.get("X-Transpose-Changes") || "none");

        const disposition = response.headers.get("Content-Disposition") || "";
        const match = disposition.match(/filename="?([^"]+)"?/);
        const selectedFormat = form.querySelector('input[name="format"]:checked')?.value || "docx";
        const filename = match ? match[1] : `transposed.${selectedFormat}`;

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);

        showTransposeResult(from, to, changes);
      } catch (err) {
        show("error", "Network error. Please try again.");
      } finally {
        submit.disabled = false;
        submit.textContent = "Transpose & Download";
      }
    });
  </script>
</body>

</html>
