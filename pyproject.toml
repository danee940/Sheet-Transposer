[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]

[tool.pytest.ini_options]
addopts = "--cov=transpose --cov=app --cov-report=term-missing --cov-fail-under=95"
testpaths = ["src/test_transpose.py", "src/test_app.py", "src/test_integration.py"]
pythonpath = ["src"]

[tool.coverage.run]
source = ["transpose", "app"]

[tool.coverage.report]
exclude_also = ['if __name__ == "__main__":']
