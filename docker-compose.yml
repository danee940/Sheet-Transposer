services:
  sheet-transposer:
    build: .
    ports:
      - "8080:8080"
    environment:
      GOTENBERG_URL: http://gotenberg:3000
    depends_on:
      - gotenberg
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.environ.get('PORT', '8080') + '/health')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gotenberg:
    image: gotenberg/gotenberg:8
    expose:
      - "3000"
    restart: unless-stopped
